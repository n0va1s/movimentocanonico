name: Deploy movimento.canonico.com.br

on:
  push:
    branches: ["main"]

# Cancela runs anteriores ainda em andamento para o mesmo branch,
# evitando deploys sobrepostos.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint & Qualidade
  # ─────────────────────────────────────────────
  lint:
    name: Lint e Qualidade
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, ctype, iconv, sqlite3
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Instalar dependências
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Lint (Pint)
        run: vendor/bin/pint --test

  # ─────────────────────────────────────────────
  # 2. Testes
  # ─────────────────────────────────────────────
  test:
    name: Testes (Pest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, ctype, iconv, sqlite3
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Instalar dependências
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copiar .env de teste
        run: cp .env.example .env

      - name: Gerar chave da aplicação
        run: php artisan key:generate

      - name: Executar testes
        run: php artisan test --parallel

  # ─────────────────────────────────────────────
  # 3. Build de Assets
  # ─────────────────────────────────────────────
  build:
    name: Build de Assets (Vite)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências Node
        run: npm ci

      - name: Build assets
        run: npm run build

      # Persiste o diretório public/build entre jobs
      - name: Upload artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: public-build
          path: public/build
          retention-days: 1

  # ─────────────────────────────────────────────
  # 4. Deploy para Hostinger via FTPS
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy para Hostinger (Apenas Pasta Pública)
    runs-on: ubuntu-latest
    needs: [test, build]
    environment: production

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Baixar artefato de build
        uses: actions/download-artifact@v4
        with:
          name: public-build
          path: public/build

      - name: Deploy via FTPS para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps          # FTPS (TLS explícito) — nunca FTP puro
          port: 21
          local-dir: ./public/build/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}/public/build/
          timeout: 120000
